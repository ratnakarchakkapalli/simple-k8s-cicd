name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

env:
  REGISTRY: docker.io
  IMAGE_NAME: ratnakar99/simple-k8s-cicd
  DOCKER_USERNAME: ratnakar99

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run validation tests
        run: |
          chmod +x tests/validate.sh
          ./tests/validate.sh
      
      - name: ✅ Tests passed
        run: echo "All validation tests passed!"

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ratnakar99
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}
            type=raw,value=latest
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
      
      - name: 🎉 Image pushed to Docker Hub
        run: |
          echo "Image pushed: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          echo "Tags: ${{ steps.meta.outputs.tags }}"

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up kubectl with kubeconfig
        if: secrets.KUBE_CONFIG != ''
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config
      
      - name: Apply Kubernetes deployment
        if: secrets.KUBE_CONFIG != ''
        run: |
          kubectl apply -f k8s/deployment.yaml
      
      - name: Trigger rolling restart
        if: secrets.KUBE_CONFIG != ''
        run: |
          kubectl rollout restart deployment/simple-k8s-cicd
      
      - name: Wait for rollout to complete
        if: secrets.KUBE_CONFIG != ''
        run: |
          kubectl rollout status deployment/simple-k8s-cicd --timeout=5m
      
      - name: ✅ Deployment completed
        if: secrets.KUBE_CONFIG != ''
        run: |
          echo "✅ Deployment completed for commit: ${{ github.sha }}"
          echo "New pods are running with the latest image"
      
      - name: ⚠️ Deployment skipped - KUBE_CONFIG secret not set
        if: secrets.KUBE_CONFIG == ''
        run: |
          echo "⚠️ KUBE_CONFIG secret is not configured"
          echo "Docker image has been built and pushed to Docker Hub"
          echo ""
          echo "To enable automatic Kubernetes deployment:"
          echo "1. Get your kubeconfig (base64 encoded)"
          echo "2. Go to: https://github.com/ratnakarchakkapalli/simple-k8s-cicd/settings/secrets/actions"
          echo "3. Add new secret 'KUBE_CONFIG' with the encoded value"
          echo ""
          echo "For now, deploy manually:"
          echo "  kubectl apply -f k8s/deployment.yaml"
          echo "  kubectl rollout restart deployment/simple-k8s-cicd"
