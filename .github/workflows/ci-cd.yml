name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

env:
  REGISTRY: docker.io
  IMAGE_NAME: ratnakar99/simple-k8s-cicd
  DOCKER_USERNAME: ratnakar99

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run validation tests
        run: |
          chmod +x tests/validate.sh
          ./tests/validate.sh
      
      - name: ✅ Tests passed
        run: echo "All validation tests passed!"

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ratnakar99
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}
            type=raw,value=latest
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      
      - name: 🎉 Image pushed to Docker Hub
        run: |
          echo "Image pushed: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          echo "Tags: ${{ steps.meta.outputs.tags }}"

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: ℹ️ Docker image has been pushed to Docker Hub
        run: |
          echo "✅ Docker image successfully built and pushed!"
          echo "Image: ratnakar99/simple-k8s-cicd:latest"
          echo ""
          echo "For automatic Kubernetes deployment:"
          echo "1. Add KUBE_CONFIG secret to GitHub: https://github.com/ratnakarchakkapalli/simple-k8s-cicd/settings/secrets/actions"
          echo "2. Then run these commands to deploy manually (for now):"
          echo ""
          echo "kubectl apply -f k8s/deployment.yaml"
          echo "kubectl rollout restart deployment/simple-k8s-cicd"
